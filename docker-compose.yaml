services:
  mongo:
    image: mongo:latest
    container_name: "mongo-devops-app"
    ports:
      - '27017:27017'
    volumes:
      - mongo_data:/data/db
    networks:
      - devops-network
  app:
    build:
      context: .
    container_name: "nodej-devops-app"
    ports:
      - '4000:3000'
    env_file:
      - .env
    volumes:
      - .:/app
      - /app/node_modules
    networks:
      - devops-network
    depends_on:
      - mongo
    restart: unless-stopped

volumes:
  mongo_data:
    driver: local

networks:
  devops-network:
    driver: bridge